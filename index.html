<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazz AI | Advanced Assistant</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Glass Header */
        header {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            height: 40px;
            margin-right: 15px;
            border-radius: 8px;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        /* Input Area */
        .input-wrapper {
            padding: 2rem;
            background: linear-gradient(transparent, var(--bg-dark));
        }

        .input-box {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://img.sanishtech.com/u/86b88fbb3abf4ebc53d5e5c1ad3f4b03.png" alt="Hazz AI Logo" class="logo">
        <div class="brand-name">HAZZ AI</div>
    </header>

    <main id="chat-container">
        <div class="message ai-message">
            Hello! I am Hazz AI. How can I assist your workflow today?
        </div>
        </main>

    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" placeholder="Type your message to Hazz AI..." id="user-input">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            
            if (input.value.trim() === "") return;

            // Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-message';
            userDiv.textContent = input.value;
            container.appendChild(userDiv);

            // Clear input and scroll
            input.value = "";
            container.scrollTop = container.scrollHeight;

            // Simulate AI response
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai-message';
                aiDiv.textContent = "Hazz AI is processing your request...";
                container.appendChild(aiDiv);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
